services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    restart: always
    env_file:
      - .env.production
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    restart: always
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    networks:
      - app-network
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongodata:/data/db
    networks:
      - app-network

networks:
  app-network:

volumes:
  pgdata:
  mongodata: