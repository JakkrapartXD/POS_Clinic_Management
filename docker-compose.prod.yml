version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    env_file:
      - .env.production
    volumes:
      - ./secrets/prod-service-account.json:/app/secrets/prod-service-account.json:ro
    restart: always
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:3000"
    env_file:
      - .env.production
    restart: always
    networks:
      - app-network

networks:
  app-network:
