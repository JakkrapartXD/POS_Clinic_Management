version: '3.8'

services:
  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev  # Next.js dev mode with hot reload

  backend:
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: bun run dev  # หากใช้ Bun
    # หรือ
    # command: npm run dev  # หากใช้ Node.js

  postgres:
    ports:
      - "5432:5432"

  mongo:
    ports:
      - "27017:27017"
